<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Painel Inventário</title>
</head>




<body>

  <div class="topo">
    <span>☰</span>
    <input type="text" placeholder="Pesquisar...">
    <span>🔔</span>
  </div>

  <div class="conteudo">
    <h1>Visão Geral do Inventário</h1>
    <p>Acompanhe e gerencie os ativos físicos do campus</p>

    <div class="cards">

      <div class="card">
        <p>Total de Ativos</p>
        <h2>2,840</h2>
      </div>

      <div class="card">
        <p>Itens em Uso</p>
        <h2>2,156</h2>
      </div>

      <div class="card destaque">
        <p>Necessita Reparo</p>
        <h2>42</h2>
      </div>

    </div>
  </div>

</body>
</html>
